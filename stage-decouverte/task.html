<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Liste des stagiaires</title>
	<link rel="stylesheet" href="https://web2018.epfl.ch/8.3.0/css/elements.min.css">
	<script src="https://web2018.epfl.ch/8.3.0/js/elements.min.js"></script>
</head>

<body>
	<header class="header header-light my-2">
		<div class="header-light-content">
			<a class="logo" href="https://www.epfl.ch"><img src="img/epfl_small.png" alt="Logo EPFL"
					class="img-fluid"></a>
			<p class="site-title"><a href="#">Liste des stagiaires</a></p>
			<nav class="nav-lang nav-lang-short ml-auto pr-lg-5"></nav>
		</div>
	</header>

	<div class="breadcrumb-container pb-0 mb-0">
		<nav aria-label="breadcrumb" class="breadcrumb-wrapper" id="breadcrumb-wrapper"></nav>
	</div>
	<div class="main-container m-4">
		<div class="my-1" style="position: relative; max-width: 300px;">
			<input type="text" id="searchInput" placeholder="Rechercher par nom..."
				style="padding-left: 30px; box-sizing: border-box;">
			<svg class="icon" aria-hidden="true"
				style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; pointer-events: none;">
				<use xlink:href="#user"></use>
			</svg>
		</div>
		<div class="my-1" style="position: relative; max-width: 300px;">
			<input type="date" id="dateInput" placeholder="Filtrer par date du stage"
				style="padding-left: 30px; box-sizing: border-box;">
			<svg class="icon" aria-hidden="true"
				style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; pointer-events: none;">
				<use xlink:href="#calendar"></use>
			</svg>
		</div>
		<div class="my-1" style="position: relative; max-width: 300px;">
			<input type="button" id="makeContact"
				title="Envoyer les infos de tous les stagiaires (affichés actuellement) sur Telegram"
				style="padding-left: 30px; box-sizing: border-box;">
			<svg class="icon" aria-hidden="true"
				style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; pointer-events: none;">
				<use xlink:href="#icon-mail-plane"></use>
			</svg>
		</div>
		<div>
			<table id="table" class="table table-boxed"></table>
		</div>
	</div>

	<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
	<script>
		const WEBHOOK_URL_EMAIL = "https://n8n.fsd.epfl.ch/webhook/631a3f12-3b64-4853-84da-79774b057273";
		const WEBHOOK_URL_CONTACT = "https://n8n.fsd.epfl.ch/webhook/687fa994-84c4-47ea-b2f4-b20efd472130";

		const searchInput = document.getElementById('searchInput');
		const dateInput = document.getElementById('dateInput');
		const sendContactButton = document.getElementById('makeContact');
		let allRecords = [];
		window.grist.ready({ requiredAccess: 'full' });

		// calculates age by entering the date of birth as a parameter
		function calculateAge(birthDate) {
			if (!birthDate) return '';
			const birth = new Date(birthDate);
			const today = new Date();
			let age = today.getFullYear() - birth.getFullYear();
			const monthDiff = today.getMonth() - birth.getMonth();
			if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
				age--;
			}
			return age;
		}
		// Triggers a webhook in n8n that send an mail (The body is for the mails) and change an boolean in grist to show if you already send the mail
		async function sendEmailWebhook(body, recordId_updateFieldInGrist, fieldName_updateFieldInGrist, value_updateFieldInGrist) {
			try {
				const response = await fetch(WEBHOOK_URL_EMAIL, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify(body)
				});

				if (response.ok) {
					await updateFieldInGrist(recordId_updateFieldInGrist, fieldName_updateFieldInGrist, value_updateFieldInGrist);
				} else {
					alert('Erreur lors de l\'envoi de l\'email');
				}
			} catch (error) {
				console.error('Erreur webhook:', error);
				alert('Erreur de connexion au webhook');
			}
		}
		// Triggers a webhook in n8n that displays a view of current trainees in the table and sends the view to Telegram
		async function sendContactWebhook(body) {
			try {
				const response = await fetch(WEBHOOK_URL_CONTACT, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify(body)
				});

				if (response.ok) {
					console.log('Contact envoyer')
				} else {
					alert('Erreur lors de l\'envoi du message');
				}
			} catch (error) {
				console.error('Erreur webhook:', error);
				alert('Erreur de connexion au webhook');
			}
		}
		// Update 1 field in the table Extraction_WPForms by giving the recordId, the field Name and the value that go in the field
		async function updateFieldInGrist(recordId, fieldName, value) {
			try {
				await window.grist.docApi.applyUserActions([
					['UpdateRecord', 'Extraction_WPForms', recordId, { [fieldName]: value }]
				]);
				console.log(`${fieldName} mis à jour pour le record ${recordId}`);
			} catch (error) {
				console.error('Erreur lors de la mise à jour du champ:', error);
			}
		}
		// retrieves the email and name of the current user in grist
		const getCurrentUserData = async () => {
			try {
				await grist.docApi.applyUserActions([[
					"AddRecord",
					"UserLog", // Need a table with an id "UserLog" and 2 column named "userName" and "userEmail" and you need to put 1 trigger formula on each of them and in the formula "user.Name" and "user.Email"
					null,
					{}
				]]);
				const table = await grist.docApi.fetchTable("UserLog");
				const lastIndex = table.id.length - 1;
				const lastElementName = table.userName[lastIndex]
				const lastElementEmail = table.userEmail[lastIndex]
				return {
					"name": lastElementName,
					"email": lastElementEmail,
				}
			} catch (error) {
				console.error("getCurrentUserData : Error code : ", error)
			}
		}
		// Take an image in input and return a data Url of the image
		async function loadImageAsDataURL(response) {
			try {
				const blob = await response.blob();
				return new Promise((resolve) => {
					const reader = new FileReader();
					reader.onloadend = () => resolve(reader.result);
					reader.readAsDataURL(blob);
				});
			} catch (error) {
				console.error('Erreur lors du chargement de l\'image:', error);
				return '';
			}
		}
		// display a table of people using an array of people as a parameter
		function renderTable(records) {
			const table = document.getElementById('table');

			while (table.rows.length > 0) table.deleteRow(0);

			if (!records || records.length === 0) {
				const row = table.insertRow();
				const cell = row.insertCell();
				cell.colSpan = 5;
				cell.textContent = 'Aucun stagiaire trouvé.';
				cell.style.textAlign = 'center';
				return;
			}

			const header = table.createTHead();
			const headerRow = header.insertRow();

			['Prénom', 'Nom', 'Date du stage', 'Email', 'Âge', 'Invitation', 'Confirmation', 'Rapport', 'Actions'].forEach(title => {
				const th = document.createElement('th');
				th.textContent = title;
				headerRow.appendChild(th);
			});

			for (const rec of records) {
				const row = table.insertRow();
				const prenomCell = row.insertCell();
				prenomCell.textContent = rec['Prenom'] || '';

				const nomCell = row.insertCell();
				nomCell.textContent = rec['Nom'] || '';

				const dateCell = row.insertCell();
				dateCell.textContent = rec['Date_du_stage'] || '';

				const emailCell = row.insertCell();
				emailCell.textContent = rec.Email || '';

				const ageCell = row.insertCell();
				const age = calculateAge(rec['Date_de_naissance']);
				ageCell.textContent = age ? `${age} ans` : '';

				const emailActions = [
					{ type: 'invitation', title: 'Envoyer email invitation', icon: 'mail', fieldName: 'isInvitationSent' },
					{ type: 'confirmation', title: 'Envoyer email confirmation', icon: 'check', fieldName: 'isConfirmationSent' },
					{ type: 'rapport', title: 'Envoyer le rapport de stage', icon: 'file', fieldName: 'isRapportSent' }
				];

				emailActions.forEach(action => {
					const statusCell = row.insertCell();
					statusCell.textContent = rec[action.fieldName] ? '✓' : '✗';
					statusCell.style.textAlign = 'center';
					statusCell.style.fontWeight = 'bold';
					statusCell.style.color = rec[action.fieldName] ? 'green' : 'red';
				});

				const actionsCell = row.insertCell();

				emailActions.forEach((action, index) => {
					const emailBtn = document.createElement('button');
					emailBtn.innerHTML = `
          <svg class="icon" aria-hidden="true">
            <use xlink:href="#${action.icon}"></use>
          </svg>
        `;
					emailBtn.title = action.title;
					emailBtn.style.border = 'none';
					emailBtn.style.cursor = 'pointer';
					if (index < emailActions.length - 1) {
						emailBtn.style.marginRight = '5px';
					}
					emailBtn.addEventListener('click', async () => {
						const confirmSend = confirm(`Envoyer ${action.type} à ${rec.Email} ?`);
						if (confirmSend) {
							const body = {
								type: action.type,
								prenom: rec['Prenom'] || '',
								nom: rec['Nom'] || '',
								email: rec.Email || '',
								dateStage: rec['Date_du_stage'] || '',
								id: rec.id
							};
							await sendEmailWebhook(body, rec.id, action.fieldName, true);
						}
					});
					actionsCell.appendChild(emailBtn);
				});
				const jsonRapportBtn = document.createElement('button');
				jsonRapportBtn.innerHTML = `
          <svg class="icon" aria-hidden="true">
            <use xlink:href="#trello"></use>
          </svg>
        `;
				jsonRapportBtn.title = "Génére le json pour le rapport";
				jsonRapportBtn.style.border = 'none';
				jsonRapportBtn.style.cursor = 'pointer';
				jsonRapportBtn.style.marginLeft = '5px';
				jsonRapportBtn.addEventListener('click', async () => {
					const confirmSend = confirm(`Ouvrir la page du rapport ?`);
					if (confirmSend) {
						const rapportDeStageDataFromGrist = await grist.docApi.fetchTable("Rapport_de_stage");
						let dataURLSignature;
						try {
							const responseUser = await getCurrentUserData();
							const attachmentId = rapportDeStageDataFromGrist.signature[0][1]
							const access = await grist.docApi.getAccessToken({ readOnly: true }); // retrieves an access token from grist
							let baseUrl = access.baseUrl;
							if (baseUrl.includes("0.0.0.0")) {
								baseUrl = baseUrl.replace("0.0.0.0", window.location.hostname);
							}
							const url = `${baseUrl}/attachments/${attachmentId}/download`;
							const response = await fetch(url, { // download the signature
								headers: { 'Authorization': `Bearer ${access.token}` }
							});
							dataURLSignature = await loadImageAsDataURL(response);
						} catch (error) {
							console.log("error lors de la récupération du user actuel : ", error);
						}
						const body = {
							json: {
								"entrepriseName": rapportDeStageDataFromGrist.entrepriseName[0],
								"responsibleName": rapportDeStageDataFromGrist.responsibleName[0],
								"responsibleMail": rapportDeStageDataFromGrist.responsibleMail[0],
								"responsiblePostalAddress": rapportDeStageDataFromGrist.responsiblePostalAddress[0],
								"responsiblePostalCode": rapportDeStageDataFromGrist.responsiblePostalCode[0],
								"responsibleLocality": rapportDeStageDataFromGrist.responsibleLocality[0],
								"responsiblePhone": rapportDeStageDataFromGrist.responsiblePhone[0],
								"internLastName": rec['Nom'],
								"internFirstName": rec['Prenom'],
								"internClass": rec['Voie_Niveau_Option'] || "-",
								"internEstablishment": rec['Ecole_ou_etablissement'] || "-",
								"internAddress": rec['Adresse_Address_Line_1'],
								"internPostalCode": `CH-${rec['Adresse_Zip_Postal_Code']}`,
								"internLocality": rec['Adresse_City'],
								"internPhone": rec['Telephone_mobile'].slice(1),
								"job": rapportDeStageDataFromGrist.job[0],
								"beginDate": new Date(rec['Date_du_stage']).toLocaleDateString('fr-CH'),
								"endDate": new Date(rec['Date_du_stage']).toLocaleDateString('fr-CH'),
								"firstImpression": "really-good",
								"ponctuality": "really-good",
								"selfConfidence": "really-good",
								"dynamism": "really-good",
								"concentrationSpan": "really-good",
								"curiosity": "really-good",
								"commitment": "really-good",
								"interestLearning": "really-good",
								"attitudeRemarks": `• ${rec['Prenom']} se prêtait volontiers aux différentes tâches avec motivation et persévérance.\n• ${rec['Prenom']} démontre une attitude mature et adaptée au contexte professionnel dès le début du stage.\n• ${rec['Prenom']} fait preuve d'une bonne capacité d'adaptation aux exigences du milieu de travail.\n• ${rec['Prenom']} adopte une posture professionnelle cohérente avec les attentes d'un environnement technique.\n• ${rec['Prenom']} contribue positivement à l'ambiance du stage par son attitude calme et mesurée.`,
								"skillful": "really-good",
								"fast": "really-good",
								"careful": "really-good",
								"methodical": "really-good",
								"persevering": "really-good",
								"attentive": "really-good",
								"followInstructions": "really-good",
								"tasksExecRemarks": `• ${rec['Prenom']} participait bien et montrait de l'intérêt dans les différentes activités proposées.\n• ${rec['Prenom']} s'implique pleinement dans les activités, même face à des tâches complexes.\n• ${rec['Prenom']} montre une bonne précision dans l’exécution des tâches techniques qui lui sont confiées.\n• ${rec['Prenom']} a parfois besoin de reformuler les consignes mais parvient ensuite à les mettre en œuvre correctement.\n• ${rec['Prenom']} parvient à gérer plusieurs petites tâches successives sans se disperser.`,
								"comfortable": "really-good",
								"helpful": "really-good",
								"polite": "really-good",
								"smiling": "really-good",
								"confidentToAsk": "really-good",
								"showInterest": "really-good",
								"expressClairly": "really-good",
								"contactRemarks": `• ${rec['Prenom']} établit facilement le contact avec les autres et s’intègre bien au sein du groupe.\n• ${rec['Prenom']} adopte une attitude respectueuse et polie avec les collaborateurs et les apprentis.\n• ${rec['Prenom']} participe volontiers aux échanges et communique de manière claire lorsque cela est nécessaire.\n• ${rec['Prenom']} montre une bonne capacité d’écoute et tient compte des remarques qui lui sont adressées.\n• ${rec['Prenom']} peut encore gagner en assurance dans ses interactions, mais le contact est globalement satisfaisant.`,
								"apprenticeshipJob": "adequate",
								"opinionRemarks": `• Le projet de formation de ${rec['Prenom']} est très pertinent et en adéquation avec ses aptitudes.\n• Le projet de formation de ${rec['Prenom']} semble cohérent, même si certains points restent à consolider.\n• L'informatique correspond bien à ${rec['Prenom']}.\n• Le projet de formation dans ce domaine n’est pas encore suffisamment affirmé pour être recommandé sans réserve.\n`,
								"adviceProject": "find-apprenticeship",
								"advicesRemarks": `• De continuer à développer ses compétences par des cours, des projets personnels ou des activités parascolaires.\n• De renforcer ses bases scolaires, en particulier en mathématiques, logique et expression écrite, qui sont essentielles dans ce métier.\n• ${rec['Prenom']} devrait explorer différents métiers liés à l'informatique pour préciser son choix (informaticien, médiamaticien..)`,
								"considerCandidate": "maybe",
								"considerCandidatesRemarks": `• Oui, au vu de son comportement et de ses compétences, ${rec['Prenom']} ferait un·e bon·ne apprenti·e.\n• Un engagement en formation pourrait être envisagé, mais nécessiterait encore une confirmation de la motivation de ${rec['Prenom']} sur la durée.\n• ${rec['Prenom']} a déjà de bonnes connaissances en informatique.\n• Non, ${rec['Prenom']} devrait d’abord développer davantage ses compétences et sa posture professionnelle avant de pouvoir être retenu·e pour une formation.`,
								"bilanStage": "no",
								"fillUpDate": new Date().toLocaleDateString('fr-CH'),
								"signature": dataURLSignature,
							}
						};
						const w = window.open(targetUrl, '_blank');
						const allowedOrigin = new URL(targetUrl).origin;
						async function onMessage(event) {
							if (!event.data?.type) return;
							if (event.source !== w) return;
							if (!event.data?.type) return;
							console.log("onMessage activate", event.data.type);
							console.log("even.origin" + event.origin + " = allowedOrigin" + allowedOrigin);
							if (event.origin !== allowedOrigin) return;
							switch (event.data.type) {

								case 'ready':
									try {
										w.postMessage(
											{ type: 'import-rapport', payload: body },
											event.origin || '*'
										);
										window.removeEventListener('message', onMessage);
										window.addEventListener('message', onMessage);
									} catch (err) {
										console.error('Erreur pendant postMessage:', err);
									}
									break;

								case 'sendPdf':
									try {
										const rapportPdfInDataUrl = event.data.payload.pdfRapportInDataUrlBase64;
										await updateFieldInGrist(rec.id, "rapportPDF", rapportPdfInDataUrl);
										window.removeEventListener('message', onMessage);
									} catch (err) {
										console.error("erreur lors de la récupération du pdf", err);
									}


									break;

								default:
									return;
							}
						}
						window.addEventListener('message', onMessage);
						// setTimeout(() => {
						// 	if (!w || w.closed) return;
						// 	try {
						// 		w.postMessage({ type: 'import-rapport', payload: body }, '*');
						// 	} catch (e) {
						// 		console.log(`Timeout from ${targetUrl}`)
						// 	}
						// }, 3000);
					}
				});
				actionsCell.appendChild(jsonRapportBtn);
			}
		}
		// filter records by using the name input and the date input
		function applyFilters() {
			const nameQuery = searchInput.value.trim().toLowerCase();
			const dateQuery = dateInput.value.trim();
			let filtered = allRecords;
			filtered = filtered.filter(rec => rec['Date_du_stage']);
			if (nameQuery) {
				filtered = filtered.filter(rec => {
					const prenom = (rec['Prenom'] || '').toLowerCase();
					const nom = (rec['Nom'] || '').toLowerCase();
					return prenom.includes(nameQuery) || nom.includes(nameQuery);
				});
			}
			if (dateQuery) {
				filtered = filtered.filter(rec => {
					const recordDate = String(rec['Date_du_stage']).trim();
					const searchDate = String(dateQuery).trim();
					const match = recordDate === searchDate;
					return match;
				});
			}
			return filtered;
		}
		// function to render the table and apply the filter
		const eventRenderTable = () => {
			const filtered = applyFilters();
			renderTable(filtered);
		};
		// Event Listener for the button to make a view of the people in the current Table
		sendContactButton.addEventListener('click', async () => {
			const confirmSend = confirm(`Envoyer les contacts sur telegram`);
			if (confirmSend) {
				const filtered = applyFilters();
				const body = {
					dateStage: dateInput.value.trim(),
					stagiaire: filtered
				}
				await sendContactWebhook(body);
			}
		});
		// retrieves data from the data source on grist and then uses this data to display the table
		window.grist.onRecords(records => {
			allRecords = records;
			if (records.length > 0) {
				console.log('Colonnes disponibles:', Object.keys(records[0]));
			}
			const filtered = applyFilters();
			// renderTable(allRecords); // without filter so even the trainee those without a date of stage
			renderTable(filtered); // with filter
		});
		searchInput.addEventListener('input', eventRenderTable);
		dateInput.addEventListener('input', eventRenderTable);
	</script>
	<script>
		svgPath = 'https://web2018.epfl.ch/8.3.0/icons/icons.svg';
		featherSvgPath = 'https://web2018.epfl.ch/8.3.0/icons/feather-sprite.svg';
	</script>
</body>

</html>
