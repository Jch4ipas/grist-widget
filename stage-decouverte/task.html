		// calculates age by entering the date of birth as a parameter
		function calculateAge(birthDate) {
			if (!birthDate) return '';
			const birth = new Date(birthDate);
			const today = new Date();
			let age = today.getFullYear() - birth.getFullYear();
			const monthDiff = today.getMonth() - birth.getMonth();
			if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
				age--;
			}
			return age;
		}

					method: 'POST',
					headers: {
						'Content-Type': 'application/json',

		}

		// Take an image in input and return a data Url of the image
		async function loadImageAsDataURL(response) {
			try {
				const blob = await response.blob();
				return new Promise((resolve) => {
					const reader = new FileReader();
					reader.onloadend = () => resolve(reader.result);
					reader.readAsDataURL(blob);
				});
			} catch (error) {
				console.error('Erreur lors du chargement de l\'image:', error);
				return '';
			}
		}

		async function handleCSVUpload(csvData) {
			try {
				const TABLE_NAME = 'Extraction_WPForms';
				const formattedCsvData = csvData.map(row => {
					const brokenKey = Object.keys(row).find(k => k.includes("Droit") && k.includes("Traitement"));
					if (brokenKey) {
						const valeurReponse = row[brokenKey];
						row["Droit à l'image_1"] = valeurReponse;
					}
					if (
						row["Entry Date"] &&
						row["Entry Date"].trim() !== "" &&
						!isNaN(row["Entry Date"]) &&
						row["Entry ID"] &&
						row["Entry ID"].includes("consens")
					) {
						row["Traitement des données personnelles"] = row["Entry ID"];
						row["Entry ID"] = row["Entry Date"];
						row["Entry Date"] = row["Entry Notes"];
						row["Entry Notes"] = row["Type"];
						row["Type"] = row["Viewed"];
						row["Viewed"] = row["Starred"];
						row["Starred"] = row["User Agent"];
					}
					const newRow = {};
					for (let key in row) {
						if (RENAME_MAP[key]) {
							newRow[RENAME_MAP[key]] = row[key];
						}
					}
					return newRow;
				});
				console.log(formattedCsvData);
				const existingData = await grist.docApi.fetchTable(TABLE_NAME);
				const existingEntryIds = new Set(
					(existingData.Entry_ID || []).map(id => String(id))
				);
				const rowsToAdd = formattedCsvData.filter(row => {
					if (!row.Entry_ID) return false;

					const currentIdText = String(row.Entry_ID);
					return !existingEntryIds.has(currentIdText);
				});
				if (rowsToAdd.length === 0) {
					alert("Aucune nouvelle ligne à ajouter. Tous les Entry_ID sont déjà dans Grist.");
					return;
				}
				const columnsForGrist = {};
				const allKeys = new Set();
				rowsToAdd.forEach(row => Object.keys(row).forEach(k => allKeys.add(k)));

				allKeys.forEach(key => {
					columnsForGrist[key] = rowsToAdd.map(row => row[key] !== undefined ? row[key] : "");
				});
				const actions = [[
					'BulkAddRecord',
					TABLE_NAME,
					rowsToAdd.map(() => null),
					columnsForGrist
				]];

				await grist.docApi.applyUserActions(actions);
				alert(`${rowsToAdd.length} nouvelle(s) ligne(s) importée(s) avec succès !`);

			} catch (error) {
				console.error("Erreur lors de l'import :", error);
				alert("Une erreur est survenue. Vérifie la console de ton navigateur pour plus de détails.");
			}
		}
		document.getElementById('csv-file').addEventListener('change', () => {

					console.log("Lecture brute par PapaParse :", results.data[0]);

					const csvData = results.data;
					await handleCSVUpload(csvData);
				}
			});
		});

		// filter records by using the name input and the date input
		function applyFilters() {
			const nameQuery = searchInput.value.trim().toLowerCase();
			const dateQuery = dateInput.value.trim();
			let filtered = allRecords;
			filtered = filtered.filter(rec => rec['Date_du_stage']);
			if (nameQuery) {
				filtered = filtered.filter(rec => {
					const prenom = (rec['Prenom'] || '').toLowerCase();
					const nom = (rec['Nom'] || '').toLowerCase();
					return prenom.includes(nameQuery) || nom.includes(nameQuery);
				});
			}
			if (dateQuery) {
				filtered = filtered.filter(rec => {
					const recordDate = String(rec['Date_du_stage']).trim();
					const searchDate = String(dateQuery).trim();
					const match = recordDate === searchDate;
					return match;
				});
			}
			return filtered;
		}
		// function to render the table and apply the filter
		const eventRenderTable = () => {
			const filtered = applyFilters();
			renderTable(filtered);
		};
